
services:
  backend:
    container_name: backend
    depends_on:
      database:
        condition: service_healthy
    entrypoint: [ "./entrypoint.sh" ]
    build:
      context: backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/app
    ports:
      - '8000:8000'
    env_file:
      - .env
    restart: always

  frontend:
    container_name: frontend
    depends_on:
      - backend
    entrypoint: [ "./entrypoint.sh" ]
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - '3000:3000'
    env_file:
      - .env
    restart: always

  database:
    container_name: database
    image: postgis/postgis:16-3.4-alpine
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s


volumes:
  postgres-data:
    driver: local