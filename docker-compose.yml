
services:
  backend:
    container_name: backend
    depends_on:
      redis:
        condition: service_healthy
    entrypoint: [ "./entrypoints/backend.sh" ]
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/app
    ports:
      - '8000:8000'
    env_file:
      - .env
    restart: always

  frontend:
    container_name: frontend
    depends_on:
      - backend
    entrypoint: [ "./entrypoints/frontend.sh" ]
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - ./frontend:/app
    ports:
      - '3000:3000'
    env_file:
      - .env
    restart: always

  redis:
    container_name: redis
    image: redis:8.2-alpine
    volumes:
      - redis-data:/data
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 1s
      timeout: 3s
      retries: 5


volumes:
  redis-data:
    driver: local