<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#0f172a" stroke="#1e40af" stroke-width="2"/>
  
  <!-- Gamma ray burst - central core -->
  <circle cx="50" cy="50" r="8" fill="#3b82f6" opacity="0.9"/>
  <circle cx="50" cy="50" r="12" fill="#3b82f6" opacity="0.5"/>
  <circle cx="50" cy="50" r="16" fill="#3b82f6" opacity="0.2"/>
  
  <!-- Radiation rays -->
  <g stroke="#06b6d4" stroke-width="2" stroke-linecap="round" opacity="0.8">
    <!-- Top ray -->
    <line x1="50" y1="50" x2="50" y2="15"/>
    <!-- Bottom ray -->
    <line x1="50" y1="50" x2="50" y2="85"/>
    <!-- Left ray -->
    <line x1="50" y1="50" x2="15" y2="50"/>
    <!-- Right ray -->
    <line x1="50" y1="50" x2="85" y2="50"/>
    <!-- Diagonal rays -->
    <line x1="50" y1="50" x2="71" y2="29"/>
    <line x1="50" y1="50" x2="29" y2="71"/>
    <line x1="50" y1="50" x2="71" y2="71"/>
    <line x1="50" y1="50" x2="29" y2="29"/>
  </g>
  
  <!-- Detector points -->
  <g fill="#f59e0b" opacity="0.7">
    <circle cx="50" cy="15" r="3"/>
    <circle cx="50" cy="85" r="3"/>
    <circle cx="15" cy="50" r="3"/>
    <circle cx="85" cy="50" r="3"/>
  </g>
  
  <!-- Outer ring - Observatory indicator -->
  <circle cx="50" cy="50" r="38" fill="none" stroke="#1e40af" stroke-width="1.5" opacity="0.6" stroke-dasharray="5,5"/>
</svg>