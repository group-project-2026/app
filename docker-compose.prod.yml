services:
  backend:
    container_name: backend
    image: ghcr.io/group-project-2026/app/backend:${BACKEND_TAG:-latest}
    depends_on:
      database:
        condition: service_healthy
    ports:
      - '8000:8000'
    env_file:
      - .env
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/api/sources/?page=1\\&page_size=1 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 180s

  frontend:
    container_name: frontend
    image: ghcr.io/group-project-2026/app/frontend:${FRONTEND_TAG:-latest}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - '3000:3000'
    env_file:
      - .env
    restart: always

  database:
    container_name: database
    image: postgis/postgis:16-3.4-alpine
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres-data:
    driver: local
